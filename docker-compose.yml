version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8742:8742"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
    environment:
      - SERVERMONITOR_CONFIG_PATH=/app/config.yaml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4829:80"
    depends_on:
      - backend
    restart: unless-stopped
