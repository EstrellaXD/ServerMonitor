services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SERVERMONITOR_CONFIG_PATH=/app/config.yaml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4829:4829"
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped
